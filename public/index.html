<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Eid AI Gift Generator 🎁 | Create Personalized Eid Wishes</title>
    <meta name="description" content="Generate personalized, funny, or emotional Eid wishes and gift ideas using AI. Create a custom Eid greeting card and share it with friends and family!">
    <meta name="keywords" content="Eid wishes, Eid gift ideas, Eid Mubarak messages, AI gift generator">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { eidgreen: '#064e3b', eidgold: '#fbbf24' },
                    fontFamily: { sans: ['Outfit', 'sans-serif'], arabic: ['Amiri', 'serif'] }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .pattern-bg { background-image: radial-gradient(#fbbf24 1px, transparent 1px); background-size: 20px 20px; opacity: 0.1; }
        .spinner { border-top-color: transparent; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-eidgreen to-black min-h-screen text-white relative">
    
    <!-- Background Pattern -->
    <div class="absolute inset-0 pattern-bg pointer-events-none"></div>

    <div class="container mx-auto px-4 py-8 relative z-10 max-w-2xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold text-eidgold mb-3">🌙 Eid AI Generator 🎁</h1>
            <p class="text-gray-300">Create the perfect Eid wish & gift idea in seconds!</p>
        </div>

        <!-- Ad/Affiliate Placeholder (Top) -->
        <div class="w-full bg-gray-800/50 border border-gray-700 rounded-lg p-2 text-center text-xs text-gray-400 mb-6">
            Advertisement Placeholder
        </div>

        <!-- Input Form Section -->
        <div id="form-section" class="glass border border-white/10 rounded-2xl p-6 shadow-2xl transition-all duration-300">
            <form id="generator-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-200">Their Name</label>
                    <input type="text" id="name" required class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-eidgold" placeholder="E.g. Sarah">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-200">Relationship</label>
                        <select id="relationship" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-eidgold">
                            <option value="Friend">Friend</option>
                            <option value="Best Friend">Best Friend</option>
                            <option value="Family">Family</option>
                            <option value="Girlfriend">Girlfriend</option>
                            <option value="Boyfriend">Boyfriend</option>
                            <option value="Crush">Crush</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-200">Tone</label>
                        <select id="tone" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-eidgold">
                            <option value="Funny 😂">Funny 😂</option>
                            <option value="Emotional 🥺">Emotional 🥺</option>
                            <option value="Romantic ❤️">Romantic ❤️</option>
                            <option value="Islamic 🕌">Islamic 🕌</option>
                        </select>
                    </div>
                </div>

                <!-- Roast Mode Toggle -->
                <div class="flex items-center justify-between p-4 bg-red-900/20 border border-red-500/30 rounded-lg">
                    <div>
                        <h3 class="font-bold text-red-400">🔥 Roast Mode</h3>
                        <p class="text-xs text-gray-400">Make the gift idea mildly insulting & funny</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="roast-mode" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500"></div>
                    </label>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-eidgold to-yellow-600 text-black font-bold text-lg py-3 rounded-lg hover:scale-[1.02] transition-transform shadow-lg">
                    ✨ Generate Magic
                </button>
            </form>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden text-center py-10">
            <div class="w-12 h-12 border-4 border-eidgold border-solid rounded-full spinner mx-auto mb-4"></div>
            <p class="text-eidgold animate-pulse">Consulting the Eid Moon... 🌙</p>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="hidden mt-8 space-y-6">
            
            <!-- The Greeting Card (Used for Download) -->
            <div id="greeting-card" class="bg-gradient-to-b from-[#064e3b] to-[#022c22] border-2 border-eidgold rounded-2xl p-8 relative overflow-hidden shadow-2xl text-center">
                <div class="absolute top-0 left-0 w-full h-full pattern-bg"></div>
                <!-- Card Content -->
                <div class="relative z-10">
                    <div class="text-4xl mb-2">🕌🌙✨</div>
                    <h2 class="font-arabic text-3xl md:text-4xl text-eidgold font-bold mb-4">Eid Mubarak!</h2>
                    <h3 class="text-2xl font-bold mb-4">To: <span id="res-name" class="text-eidgold"></span></h3>
                    
                    <div class="bg-black/30 rounded-lg p-4 mb-4 border border-white/10">
                        <p class="text-sm text-gray-300 uppercase tracking-widest mb-1">Message</p>
                        <p id="res-msg" class="text-lg italic text-white leading-relaxed"></p>
                    </div>

                    <div class="bg-eidgold/10 rounded-lg p-4 border border-eidgold/30">
                        <p class="text-sm text-eidgold uppercase tracking-widest mb-1">Gift Idea 🎁</p>
                        <p id="res-gift" class="text-white font-medium"></p>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <button onclick="downloadCard()" class="glass border border-white/20 py-3 rounded-lg hover:bg-white/10 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-download"></i> Save Image
                </button>
                <button onclick="shareWhatsApp()" class="bg-green-600 hover:bg-green-700 py-3 rounded-lg transition flex items-center justify-center gap-2">
                    <i class="fa-brands fa-whatsapp"></i> WhatsApp
                </button>
                <button onclick="copyLink()" class="glass border border-white/20 py-3 rounded-lg hover:bg-white/10 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-link"></i> Copy Link
                </button>
            </div>
            
            <div class="text-center">
                <button onclick="resetApp()" class="text-gray-400 hover:text-white underline text-sm mt-2">Create Another</button>
            </div>
        </div>

        <!-- Eidi Fun Mode (Extra) -->
        <div class="mt-12 glass border border-white/10 rounded-2xl p-6 text-center">
            <h3 class="text-xl font-bold text-eidgold mb-2">🎉 Eidi Fun Mode</h3>
            <p class="text-sm text-gray-300 mb-4">Who is giving you Eidi this year?</p>
            <button onclick="spinEidi()" class="bg-white text-black font-bold px-6 py-2 rounded-full hover:bg-gray-200 transition">
                Spin the Wheel 🎡
            </button>
            <p id="eidi-result" class="text-lg font-bold mt-4 text-green-400 hidden"></p>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
